name: AWS S3 Auto Deploy

# 어떤 이벤트가 발생했을 때 이 워크플로우를 실행할지 정의합니다.
on:
  push:
    branches:
      - main # main 브랜치에 코드가 push되거나 PR이 머지되면 실행

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. GitHub 저장소의 최신 코드를 가상 환경으로 가져옵니다.
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 빌드를 위한 Node.js 환경을 세팅합니다.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 현재 프로젝트에서 사용하는 Node.js 버전

      # 3. 패키지를 설치하고 배포용 파일로 빌드합니다.
      - name: Install dependencies and Build
        run: |
          npm ci
          npm run build

      # 4. 2단계에서 설정한 GitHub Secrets를 사용해 AWS 자격 증명을 인증합니다.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2 # S3 버킷이 있는 AWS 리전 (서울은 ap-northeast-2)

      # 5. 빌드된 정적 파일들을 S3 버킷으로 업로드합니다.
      - name: Deploy to S3
        run: |
          aws s3 sync ./dist s3://your-s3-bucket-name --delete
          # ./dist 부분: 빌드 결과물 폴더명 (Vite는 dist, CRA는 build 등)
          # your-s3-bucket-name 부분: 실제 본인의 AWS S3 버킷 이름으로 변경 필수!
